<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
    <title>deskPet</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <canvas id="pet" class="pet" width="256" height="256"></canvas>
    <div id="badge" class="badge"></div>

    <script src="scripts/animator.js"></script>
    <script>
      (async () => {
        const pet = document.getElementById('pet');
        const badge = document.getElementById('badge');

        pet.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          window.deskPet?.showContextMenu();
        });

        const save = await window.deskPet?.getSave?.();
        const breed = save?.dog?.breed || 'shiba';

        const animator = new Animator(pet, { breed, action: 'idle' });
        await animator.load('idle');
        animator.start();

        window.deskPet?.onFocusChange?.((focused) => {
          animator.setFps(focused ? window.ANIMATOR_FPS.ACTIVE : window.ANIMATOR_FPS.IDLE);
        });

        let badgeTimer = null;
        const BADGE_LABELS = { eat: '正在进食…', play: '在玩耍…' };

        window.deskPet?.onPetAction?.((payload) => {
          if (!payload?.type) return;
          const label = BADGE_LABELS[payload.type] || '';
          if (label) {
            badge.textContent = label;
            badge.classList.add('badge--show');
            if (badgeTimer) clearTimeout(badgeTimer);
            badgeTimer = setTimeout(() => badge.classList.remove('badge--show'), payload.durationMs || 2500);
          }
          animator.playTransient(payload.type, payload.durationMs || 2500);
        });
      })();
    </script>
  </body>
</html>
