<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
    <title>deskPet</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="bubble-area">
      <div id="bubble" class="bubble"></div>
    </div>
    <div class="pet-area" id="pet-area">
      <div id="badge" class="badge"></div>
      <canvas id="pet" class="pet" width="256" height="256"></canvas>
      <div id="away" class="away" hidden>
        <div class="away__icon">✈</div>
        <div class="away__text">去旅行了…</div>
      </div>
    </div>

    <script src="scripts/animator.js"></script>
    <script src="scripts/postcard.js"></script>
    <script>
      // ---- 状态容器（late binding：监听器可能在 animator/helpers 创建前就被触发）----
      let animator = null;
      let applyTravelStatusFn = null;
      let showBadgeFn = null;
      let showBubbleFn = null;
      const BADGE_LABELS = { eat: '正在进食…', play: '在玩耍…' };

      // ---- 监听器在脚本同步段就注册，避免与主进程的初始化广播竞态 ----
      window.deskPet?.onPetAction?.((payload) => {
        if (!payload?.type) return;
        if (payload.type === 'levelup') {
          showBadgeFn?.(`升级！Lv ${payload.level}`, payload.durationMs || 2500);
          animator?.playTransient('levelup', payload.durationMs || 2500);
          return;
        }
        const label = BADGE_LABELS[payload.type];
        if (label) showBadgeFn?.(label, payload.durationMs || 2500);
        animator?.playTransient(payload.type, payload.durationMs || 2500);
      });

      window.deskPet?.onPetState?.((payload) => {
        if (payload?.mood) animator?.setMood(payload.mood);
        if (payload?.travelStatus) applyTravelStatusFn?.(payload.travelStatus);
      });

      window.deskPet?.onPetSpeak?.((payload) => {
        if (payload?.text) showBubbleFn?.(payload.text, payload.durationMs || 4500);
      });

      (async () => {
        const pet = document.getElementById('pet');
        const badge = document.getElementById('badge');
        const bubble = document.getElementById('bubble');
        const away = document.getElementById('away');

        function bindContextMenu(el) {
          el.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            window.deskPet?.showContextMenu();
          });
        }
        bindContextMenu(pet);
        bindContextMenu(away);

        applyTravelStatusFn = function (status) {
          const isAway = status === 'away';
          pet.style.display = isAway ? 'none' : '';
          away.hidden = !isAway;
        };

        let badgeTimer = null;
        showBadgeFn = function (text, durationMs) {
          badge.textContent = text;
          badge.classList.add('badge--show');
          if (badgeTimer) clearTimeout(badgeTimer);
          badgeTimer = setTimeout(() => badge.classList.remove('badge--show'), durationMs);
        };

        let bubbleTimer = null;
        showBubbleFn = function (text, durationMs) {
          bubble.textContent = text;
          bubble.classList.add('bubble--show');
          if (bubbleTimer) clearTimeout(bubbleTimer);
          bubbleTimer = setTimeout(() => bubble.classList.remove('bubble--show'), durationMs);
        };

        const save = await window.deskPet?.getSave?.();
        const breed = save?.dog?.breed || 'shiba';
        const initialMood = save?.dog?.mood || 'normal';

        animator = new Animator(pet, { breed, action: 'idle', mood: initialMood });
        await animator.load('idle');
        animator.start();

        applyTravelStatusFn(save?.travel?.status || 'idle');

        window.deskPet?.onFocusChange?.((focused) => {
          animator.setFps(focused ? window.ANIMATOR_FPS.ACTIVE : window.ANIMATOR_FPS.IDLE);
        });

        // 重新拉一次状态：setup 期间主进程可能已经把 away 转走（resumeTravelIfMidFlight）
        const freshSave = await window.deskPet?.getSave?.();
        if (freshSave) {
          if (freshSave.dog?.mood) animator.setMood(freshSave.dog.mood);
          applyTravelStatusFn(freshSave.travel?.status || 'idle');
        }
      })();
    </script>
  </body>
</html>
